<body>

<header>
  <div class="title-row">
    <h1>dexipurei-galore <span class="sub">ディスプレイ galore</span></h1>
    <span id="cb-badge-slot"></span>
  </div>
</header>

<div class="app" id="app" data-view="landing">
  <nav id="tabs" class="rail" aria-label="display modules"></nav>

  <main class="main">
    <!-- LANDING: one input drives every preview -->
    <section id="landing-view">
      <div class="landing-head">
        <input id="landing-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off"
               spellcheck="false" maxlength="24" placeholder="type anything — 日本語 too…">
        <p class="landing-hint">Each preview shows your text if it can render it; dimmed ones can't (e.g. seven-segment is digits only). Tap a display to open it full-screen.</p>
      </div>
      <div id="landing" class="landing"></div>
    </section>

    <!-- MODULE: display pinned to the top, collapsible controls below -->
    <section id="module-view" hidden>
      <div class="module-bar">
        <button id="back-btn" type="button">‹ gallery</button>
        <h2 id="module-name"></h2>
      </div>
      <div class="stage-sticky">
        <div class="bezel" id="stage"><canvas id="screen"></canvas></div>
      </div>
      <p id="physics" class="physics"></p>
      <aside id="panel" class="panel"></aside>
    </section>
  </main>
</div>

<div id="sw-toast" role="status"></div>
<div id="ios-hint" role="note"></div>

<script type="module" src="src/app.js?v=7d06a61c"></script>
<script>
(function () {
  if (!('serviceWorker' in navigator)) return;
  var toast = document.getElementById('sw-toast');
  function showUpdate(worker) {
    toast.innerHTML = '<span>New version available.</span>';
    var b = document.createElement('button'); b.type = 'button'; b.textContent = 'Refresh';
    b.onclick = function () { worker.postMessage({ type: 'SKIP_WAITING' }); };
    toast.appendChild(b); toast.style.display = 'flex';
  }
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js').then(function (reg) {
      if (reg.waiting && navigator.serviceWorker.controller) showUpdate(reg.waiting);
      reg.addEventListener('updatefound', function () {
        var nw = reg.installing; if (!nw) return;
        nw.addEventListener('statechange', function () {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) showUpdate(nw);
        });
      });
    }).catch(function () {});
    var reloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', function () {
      if (reloaded) return; reloaded = true; window.location.reload();
    });
  });
  // iOS Safari has no beforeinstallprompt — show a one-time Add-to-Home-Screen hint to non-installed users.
  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  if (isIOS && !(('standalone' in navigator) && navigator.standalone) && !localStorage.getItem('a2hs-dismissed')) {
    var hint = document.getElementById('ios-hint');
    hint.innerHTML = '<span>Install: tap <b>Share</b> ↑ then <b>Add to Home Screen</b></span>';
    var x = document.createElement('button'); x.type = 'button'; x.textContent = 'OK';
    x.onclick = function () { hint.style.display = 'none'; try { localStorage.setItem('a2hs-dismissed', '1'); } catch (e) {} };
    hint.appendChild(x); hint.style.display = 'flex';
  }
})();
</script>
</body>
</html>
